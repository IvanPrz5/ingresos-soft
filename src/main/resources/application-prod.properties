# Puerto del servidor
server.port=8585
# Base de datos Universal (maestra)
spring.datasource.universal.jdbc-url=jdbc:postgresql://127.0.0.1:5432/ingresos_entidades-prod
spring.datasource.universal.username=postgres
spring.datasource.universal.password=Qazxsw2.Po
spring.datasource.universal.driver-class-name=org.postgresql.Driver
spring.datasource.universal.hikari.maximum-pool-size=3
spring.datasource.universal.hikari.minimum-idle=1
spring.datasource.universal.hikari.connection-timeout=20000
spring.datasource.universal.hikari.idle-timeout=300000
spring.datasource.universal.hikari.max-lifetime=1800000
spring.datasource.universal.hikari.leak-detection-threshold=60000
spring.datasource.universal.hikari.connection-test-query=SELECT 1
spring.datasource.universal.hikari.validation-timeout=5000
# Configuracion para datasources dinamicos (Nomina y Facturacion)
spring.datasource.dynamic.url-prefix=jdbc:postgresql://127.0.0.1:5432/
spring.datasource.dynamic.username=postgres
spring.datasource.dynamic.password=Qazxsw2.Po
spring.datasource.dynamic.driver-class-name=org.postgresql.Driver
# Configuracion de HikariCP para datasources dinamicos
spring.datasource.dynamic.hikari.maximum-pool-size=3
spring.datasource.dynamic.hikari.minimum-idle=1
spring.datasource.dynamic.hikari.connection-timeout=20000
spring.datasource.dynamic.hikari.idle-timeout=300000
spring.datasource.dynamic.hikari.max-lifetime=1800000
spring.datasource.dynamic.hikari.leak-detection-threshold=60000
spring.datasource.dynamic.hikari.connection-test-query=SELECT 1
spring.datasource.dynamic.hikari.validation-timeout=5000
# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Configuracion de carga de archivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB